<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#fbff00">
  <title>DB G.O.A.T.S | PORTAL</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --neon: #fbff00; --accent: #00d4ff; --green: #00ff88; --red: #ff416c; --bg: #050508; --gold: #d4af37; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }
    .preloader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #050508; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
    .loader-pulse { animation: pulseLogo 0.8s infinite alternate; }
    @keyframes pulseLogo { from { transform: scale(0.9); } to { transform: scale(1.1); } }
    .bg-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; background-size: cover; background-position: center; filter: brightness(0.2) blur(6px); }
    .header { padding: calc(10px + env(safe-area-inset-top)) 14px 12px; display: grid; grid-template-columns: 60px 1fr 60px; align-items: center; gap: 8px; background: rgba(0,0,0,0.9); border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 100; }
    .logo-img { width: 54px; height: 54px; object-fit: contain; }
    .founder-img { width: 54px; height: 54px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; }
    .header-title h1 { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; text-align: center; }
    .header-title p { font-size: 8px; color: var(--neon); text-align: center; text-transform: uppercase; }
    #sync-status { position: fixed; bottom: 12px; right: 12px; font-size: 8px; padding: 4px 8px; border-radius: 20px; background: rgba(0,0,0,0.8); z-index: 200; }
    .status-live { color: var(--green); } .status-offline { color: var(--red); }
    .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; padding: 20px 14px; }
    .dept-card { background: rgba(20,20,25,0.95); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 22px 10px; text-align: center; cursor: pointer; transition: transform 0.1s; }
    .dept-card:active { transform: scale(0.95); }
    .activity-tabs { display: flex; gap: 10px; margin: 0 16px 16px; }
    .tab-btn { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-family: 'Bebas Neue', sans-serif; font-size: 16px; cursor: pointer; opacity: 0.6; }
    .tab-btn.active { background: var(--neon); color: black; opacity: 1; border-color: var(--neon); }
    .medal-section { padding: 16px; text-align: center; }
    .medal-row { display: flex; gap: 8px; justify-content: center; align-items: flex-end; margin-bottom: 12px; }
    .medal-btn { border: none; cursor: pointer; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.2s; font-family: 'Bebas Neue', sans-serif; color: black; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .medal-1st { width: 90px; height: 90px; background: linear-gradient(145deg, #ffd700, #b8860b); }
    .medal-2nd { width: 76px; height: 76px; background: linear-gradient(145deg, #e8e8e8, #a0a0a0); }
    .medal-3rd { width: 76px; height: 76px; background: linear-gradient(145deg, #e8a060, #8b4513); }
    .medal-plus { width: 68px; height: 68px; border-radius: 14px; background: linear-gradient(135deg, #00b09b, #00ff88); }
    .medal-minus { width: 68px; height: 68px; border-radius: 14px; background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; }
    .medal-btn.selected { transform: scale(1.15); box-shadow: 0 0 25px var(--neon); border: 2px solid white; }
    .tier-indicator { text-align: center; padding: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; border-radius: 10px; margin: 0 16px 16px; border: 1px solid #333; }
    .tier-indicator.negative { color: var(--red); border-color: var(--red); }
    .house-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 16px; }
    .house-btn { padding: 25px 0; border-radius: 16px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: black; cursor: pointer; }
    #login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .modal-box { background: #1a1a1a; padding: 30px; border-radius: 20px; width: 90%; max-width: 360px; text-align: center; border: 1px solid var(--neon); }
    input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: white; border-radius: 10px; font-size: 16px; }
    .btn-main { width: 100%; padding: 14px; background: var(--neon); border: none; border-radius: 10px; font-weight: 900; font-family: 'Bebas Neue', sans-serif; font-size: 18px; cursor: pointer; }
    #toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 12px 24px; border-radius: 30px; transition: 0.4s; z-index: 5000; }
    #toast.show { bottom: 30px; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto 16px; border-radius: 16px; overflow: hidden; }
    .scoreboard { padding: 16px; background: #000; display: flex; gap: 8px; overflow-x: auto; }
    .score-chip { flex: 0 0 80px; padding: 10px; text-align: center; background: #111; border-radius: 12px; border-top: 3px solid #333; }
    #paper-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); background: black; border: 2px solid var(--neon); padding: 30px; border-radius: 24px; z-index: 10000; text-align: center; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    #paper-popup.show { transform: translate(-50%, -50%) scale(1); }
  </style>
</head>
<body onload="boot()">
  <div class="preloader" id="preloader">⚡<div style="font-family:'Bebas Neue';color:var(--neon);font-size:24px;">G.O.A.T.S</div></div>
  <div id="sync-status">OFFLINE</div>
  <div class="bg-overlay" id="main-bg"></div>
  <div id="toast"></div>
  <div id="paper-popup">
    <div id="pop-status" style="color:var(--neon);font-weight:900;">POINT AWARDED</div>
    <div id="pop-medal" style="font-size:50px;">🥇</div>
    <div id="pop-name" style="font-family:'Bebas Neue';font-size:32px;">NAME</div>
    <div id="pop-pts" style="font-size:60px;font-family:'Bebas Neue';color:var(--neon);">+10</div>
    <div id="pop-house" style="padding:10px;border-radius:10px;color:black;font-weight:900;">HOUSE</div>
  </div>
  <div class="header">
    <img id="m-logo" class="logo-img">
    <div class="header-title">
      <h1>DON BOSCO POLYTECHNIC</h1>
      <p>G.O.A.T.S CHAMPIONSHIP</p>
    </div>
    <img id="m-founder" class="founder-img">
  </div>
  <div id="dept-gate"><div id="dept-grid" class="dept-grid"></div></div>
  <div id="teacher-view" style="display:none;">
    <div class="scoreboard"><div id="score-strip" style="display:flex;gap:10px;"></div></div>
    <div class="activity-tabs">
      <button id="tab-team" class="tab-btn active" onclick="switchMode('team')">👥 TEAM</button>
      <button id="tab-indiv" class="tab-btn" onclick="switchMode('indiv')">👤 INDIVIDUAL</button>
    </div>
    <div class="medal-section">
      <div class="medal-row">
        <button class="medal-btn medal-2nd" id="medal-2" onclick="selectTier('2nd')">🥈<br><span id="m-pts-2">+10</span></button>
        <button class="medal-btn medal-1st" id="medal-1" onclick="selectTier('1st')">🥇<br><span id="m-pts-1">+15</span></button>
        <button class="medal-btn medal-3rd" id="medal-3" onclick="selectTier('3rd')">🥉<br><span id="m-pts-3">+5</span></button>
      </div>
      <div style="display:flex;justify-content:center;gap:15px;">
        <button class="medal-btn medal-plus" id="medal-plus" onclick="selectTier('plus')">➕<br><span id="m-pts-plus">+5</span></button>
        <button class="medal-btn medal-minus" id="medal-minus" onclick="selectTier('minus')">➖<br><span id="m-pts-minus">-2</span></button>
      </div>
    </div>
    <div class="tier-indicator" id="tier-indicator">1ST PLACE</div>
    
    <div id="house-grid" class="house-grid"></div>
    <div id="indiv-area" style="display:none;padding:0 16px;">
      <div style="text-align:center;"><button class="btn-main" onclick="toggleCam()" style="width:80px;height:80px;border-radius:50%;">📷</button></div>
      <div id="reader" style="display:none;"></div>
      <input type="text" id="man-name" placeholder="Student Name">
      <select id="man-house"></select>
      <button class="btn-main" onclick="submitManual()">SUBMIT INDIVIDUAL</button>
    </div>
    <div style="padding:16px;">
      <textarea id="remarks-input" placeholder="Remarks (optional)"></textarea>
      <select id="p-cat"></select>
      <select id="t-name"><option disabled selected>Select Your Name</option></select>
    </div>
    <div id="admin-actions" style="display:none;padding:16px;gap:10px;flex-direction:column;">
      <button class="btn-main" onclick="generateReport('annually')" style="background:#00d4ff;">ANNUAL REPORT</button>
      <button class="btn-main" onclick="generateReport('weekly')" style="background:#00ff88;">WEEKLY REPORT</button>
    </div>
    <button class="btn-main" onclick="logout()" style="background:#333;color:white;margin:20px 16px;width:calc(100% - 32px);">LOGOUT</button>
  </div>
  <div id="login-modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-box">
      <h2 id="target-dept">DEPT</h2>
      <input type="password" id="pass-input" placeholder="Password">
      <button class="btn-main" onclick="handleLogin()">ENTER</button>
    </div>
  </div>
  <script>
    const API = "https://script.google.com/macros/s/AKfycbwl51arq9aOBoZXhB0JvahrL8QkEtbWUh7Yk1djIhe2bUWA2Kug38ku40Tsw1ieCR5oaQ/exec";
    let houseColors = {}, scores = {}, currentDept = "", selectedDept = "", isAdmin = false, currentMode = 'team', currentTier = '1st';
    let pointSettings = { team: {'1st':20,'2nd':15,'3rd':10,'plus':10,'minus':-5}, indiv: {'1st':15,'2nd':10,'3rd':5,'plus':5,'minus':-2} };
    let scanActive = false, html5QrCode = null;
    async function api(p) { return fetch(API, {method:"POST", body:JSON.stringify(p)}).then(r=>r.json()); }
    async function boot() {
      const res = await api({action:"getAppData"});
      if(res){ 
        pointSettings = res.pointSettings || pointSettings; 
        houseColors = {}; 
        render(res); 
        document.getElementById('sync-status').innerText="LIVE";
      }
      document.getElementById('preloader').style.display='none';
      switchMode('team');
    }
    function render(data) {
      const grid = document.getElementById('dept-grid');
      grid.innerHTML = data.deptList.map(d => `<div class="dept-card" onclick="openLogin('${d}')"><b>${d}</b></div>`).join('');
      document.getElementById('p-cat').innerHTML = data.categories.map(c => `<option>${c}</option>`).join('');
      const hGrid = document.getElementById('house-grid'), strip = document.getElementById('score-strip'), mHouse = document.getElementById('man-house');
      hGrid.innerHTML = ''; strip.innerHTML = ''; mHouse.innerHTML='<option disabled selected>House</option>';
      data.houseConfig.forEach(h => {
        houseColors[h.name] = h.color; scores[h.name] = 0;
        hGrid.innerHTML += `<button class="house-btn" style="background:${h.color}" onclick="record('${h.name}','GROUP')">${h.name}</button>`;
        strip.innerHTML += `<div class="score-chip" style="border-top-color:${h.color}">${h.name}<br><b id="s-${h.name}">0</b></div>`;
        mHouse.add(new Option(h.name, h.name));
      });
      if(data.images.bg) document.body.style.backgroundImage = `url('${data.images.bg}')`;
      document.getElementById('m-logo').src = data.images.logo;
      document.getElementById('m-founder').src = data.images.founder;
    }
    function switchMode(m) {
      currentMode = m;
      document.getElementById('tab-team').className = m==='team' ? 'tab-btn active' : 'tab-btn';
      document.getElementById('tab-indiv').className = m==='indiv' ? 'tab-btn active' : 'tab-btn';
      document.getElementById('house-grid').style.display = m==='team' ? 'grid' : 'none';
      document.getElementById('indiv-area').style.display = m==='indiv' ? 'block' : 'none';
      updateMedalUI();
    }
    function updateMedalUI() {
      const p = pointSettings[currentMode];
      document.getElementById('m-pts-1').innerText = '+'+p['1st'];
      document.getElementById('m-pts-2').innerText = '+'+p['2nd'];
      document.getElementById('m-pts-3').innerText = '+'+p['3rd'];
      document.getElementById('m-pts-plus').innerText = '+'+p['plus'];
      document.getElementById('m-pts-minus').innerText = p['minus'];
      selectTier(currentTier);
    }
    function selectTier(t) {
      currentTier = t;
      ['medal-1','medal-2','medal-3','medal-plus','medal-minus'].forEach(id => document.getElementById(id).classList.remove('selected'));
      document.getElementById('medal-'+t).classList.add('selected');
      const pts = pointSettings[currentMode][t];
      const ind = document.getElementById('tier-indicator');
      ind.innerText = t.toUpperCase() + ' (' + (pts>0?'+':'') + pts + ')';
      ind.className = pts < 0 ? 'tier-indicator negative' : 'tier-indicator';
    }
    async function record(h, name) {
      const teacher = document.getElementById('t-name').value;
      if(!teacher) { alert("Select teacher name!"); return; }
      const pts = pointSettings[currentMode][currentTier];
      scores[h] += pts; document.getElementById('s-'+h).innerText = scores[h];
      showPop(h, name, pts);
      api({action:"submitPoint", data:{dept:currentDept, studentName:name, house:h, points:pts, teacherName:teacher, category:document.getElementById('p-cat').value, remarks:document.getElementById('remarks-input').value}});
      document.getElementById('remarks-input').value = '';
    }
    function showPop(h, name, pts) {
      const p = document.getElementById('paper-popup');
      document.getElementById('pop-name').innerText = name;
      document.getElementById('pop-pts').innerText = (pts>0?'+':'')+pts;
      document.getElementById('pop-house').innerText = h;
      document.getElementById('pop-house').style.background = houseColors[h];
      p.classList.add('show'); setTimeout(()=>p.classList.remove('show'), 2000);
    }
    function openLogin(d) { selectedDept = d; document.getElementById('target-dept').innerText=d; document.getElementById('login-modal').style.display='flex'; }
    async function handleLogin() {
      const res = await api({action:"authenticate", user:selectedDept, pass:document.getElementById('pass-input').value});
      if(res.success) {
        currentDept = selectedDept; isAdmin = res.role==='Admin';
        document.getElementById('login-modal').style.display='none';
        document.getElementById('dept-gate').style.display='none';
        document.getElementById('teacher-view').style.display='block';
        document.getElementById('admin-actions').style.display = isAdmin ? 'flex' : 'none';
        loadStaff(currentDept);
      } else alert("Wrong Password");
    }
    async function loadStaff(d) {
      const res = await api({action:"getStaffByDept", dept:d});
      const sel = document.getElementById('t-name');
      sel.innerHTML = '<option disabled selected>Select Your Name</option>';
      res.staff.forEach(s => sel.add(new Option(s, s)));
    }
    async function toggleCam(){
      if(!scanActive){
        document.getElementById('reader').style.display='block';
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:250}, t => {
          const p = t.split('|'); if(p.length>=3) record(p[2].trim(), p[0].trim());
          stopCam();
        });
        scanActive=true;
      } else stopCam();
    }
    async function stopCam(){ if(html5QrCode) await html5QrCode.stop(); document.getElementById('reader').style.display='none'; scanActive=false; }
    function submitManual(){ const n = document.getElementById('man-name').value, h=document.getElementById('man-house').value; if(n && h) record(h,n); }
    function logout(){ location.reload(); }
    async function generateReport(period) { window.open(API+"?action=getReportData&period="+period); }
  </script>
</body>
